trigger: none
  # branches:
  #   include:
  #     - main
#   paths:
#     include:
#       - PyTodoBackendMonolith/*
#       - Todo_App_UI/*
#       - azure-pipelines.yml

# pr:
#   branches:
#     include:
#       - main

pool: Azure Pipelines
  # vmImage: 'ubuntu-latest'

variables:

  backendFolder: 'PyTodoBackendMonolith'
  frontendFolder: 'Todo_App_UI'
  # dockerRegistryServiceConnection: 'docker-hub-conn'       # service connection name
  # backendImage: 'yourusername/todo-backend'                # e.g. myacr.azurecr.io/todo-backend
  # frontendImage: 'yourusername/todo-frontend'
  # tag: '$(Build.BuildId)'

stages:

  - stage: Lint
    displayName: 'Lint Code'
    
    jobs:

      - job: LintBackend
        displayName: 'Lint Python Backend'
        steps:
        - task: UsePythonVersion@0
          inputs:
            versionSpec: '3.12'
            addToPath: true
            architecture: 'x64'
          displayName: Set Python Version

        - script: |
              pwd
              ls -lrth
              cd PyTodoBackendMonolith
              python -m pip install --upgrade pip
              pip install flake8 pylint
              cd $(backendFolder)
              pip install -r requirements.txt
          displayName: 'Install backend deps'

        - script: |

              flake8 $(backendFolder) --count --select=E9,F63,F7,F82 --show-source --statistics
              pylint $(backendFolder) --recursive=y

          displayName: 'Lint with flake8 + pylint'
          continueOnError: true   

      - job: LintFrontend
        displayName: Lint Frontend Code
        steps:
        - task: NodeTool@0
          displayName: 'Install Node.js'
          inputs:
            versionSpec: '18.x'

        - script: |

              cd $(frontendFolder)
              npm install
              # Install lint tools if not in package.json (run locally once and commit)
              npm install --save-dev eslint @eslint/js globals eslint-plugin-react eslint-config-standard stylelint stylelint-config-standard @biomejs/biome
          displayName: 'Install frontend deps + lint tools'

        - script: |
      
            cd $(frontendFolder)
            npx eslint src/ --ext .js,.jsx,.ts,.tsx
            npx stylelint "**/*.css"
            npx biome lint ./src

          displayName: 'Lint with eslint + stylelint + biome'
          continueOnError: true    
          
  - stage: Scanning
  
    displayName: Security Scanning
    dependsOn: Lint
    
    jobs: 
    
    - job: ScanBackend
      displayName: Scan Python Dependencies
      steps:
      - task: UsePythonVersion@0
        inputs:
              versionSpec: '3.12'

      - script: |
              pip install pip-audit
              cd $(backendFolder)
              pip-audit -r requirements.txt --ignore-vuln PYSEC-2023-1   # Add --ignore if needed
        displayName: 'Dependency scan with pip-audit'    

    - job: ScanFrontend
      displayName: Scan Code with Retire.Js
      steps:
        - task: NodeTool@0
          inputs:
              versionSpec: '18.x'
        
        - script: |
              cd $(frontendFolder)
              npm install
              npm install --save-dev retire
              npx retire --outputformat json --outputpath retire-report.json --severity high
          
          displayName: 'Retire.js scan'
          continueOnError: true


